trigger:
- main

pr: none

resources:
- repo: self

variables:
  - group: acr_service_connection
  - group: arm_service_connection
  - name: imageRepository
    value: 'dapprototype'
  - name: containerRegistry
    value: 'dapalphaacrdev.azurecr.io'
  - name: dockerfilePath
    value: '**/Dockerfile'
  - name: tag
    value: '$(Build.BuildId)'
  - name: vmImageName
    value: 'ubuntu-latest'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dev_acr_connection)
        tags: |
          $(tag)
- stage: Deploy
  displayName: Deploy to App Service
  jobs:
    - job: Deploy
      pool:
        vmImage: $(vmImageName)
      steps:
        - task: AzureWebAppContainer@1
          inputs:
            appType: "webAppLinux"
            appName: "gascd-prototype"
            azureSubscription: $(dev_arm_service_connections)
            containers: "$(containerRegistry)/$(imageRepository):$(tag)"