    <!-- 
    
    Time series 
    
    -->
    <style>
        .date-pickers{display:inline-grid;
            grid-template-columns: auto auto;
            gap:1em
        }
    </style>
        <h3>
            Total population change
        </h3>
        <ul class="govuk-list">
            <li>
                <svg height="5" width="50" xmlns="http://www.w3.org/2000/svg">
                    <g fill="none">
                        <line x1="0" y1="0" x2="50" y2="0" stroke="purple" stroke-width="10" />
                    </g>
                </svg> 
                Suffolk</li>
           <li>
                <svg height="5" width="50" xmlns="http://www.w3.org/2000/svg">
                    <g fill="none">
                        <line x1="0" y1="0" x2="50" y2="0" stroke="gold" stroke-width="10" />
                    </g>
                </svg> 
                East of England</li>
                <li>
                    <svg height="5" width="50" xmlns="http://www.w3.org/2000/svg">
                        <g fill="none">
                            <line x1="0" y1="0" x2="50" y2="0" stroke="orange" stroke-width="10" />
                        </g>
                    </svg> 
                    All England</li>
                    
                </ul>
                <!-- 
                
                Chart  
                
                -->
                <style>
                    .data-chart{width:100%; overflow-x: scroll;}
                </style>
                {% set chartHeight = 400 %} 
                {% set chartWidth = 600 %} 
                {% set topMargin = 20 %}
                {% set leftMargin = 40 %} 
                <svg height="{{chartHeight}}" width="{{chartWidth}}" xmlns="http://www.w3.org/2000/svg" class="data-chart">
                    <defs>
                        <style>
                            text{font-family: 'Helvetica Neue', sans-serif; }
                        </style>
                    </defs>

                    <title>Total beds per 100,000 population in Suffolk: 1 April 2021 to 1 November 2023</title>
                    
                    <!-- 	Y Scale -->
                    <text class="axis-text"x="0" y="10%" fill="#666">8%</text>
                    <text class="axis-text"x="0" y="30%" fill="#666">6%</text>
                    <text class="axis-text"x="0" y="50%" fill="#666">4%</text>
                    <text class="axis-text"x="0" y="70%" fill="#666">2%</text>
                    <text class="axis-text"x="0" y="90%" fill="#666">0</text>
                    
                    <g transform="translate(20,0)">
                        <!-- 		Axes -->
                        <line x1="{{leftMargin}}" y1="0" x2="{{leftMargin}}" y2="90%" style="stroke:#666;stroke-width:2" />
                        <line x1="{{leftMargin}}" y1="90%" x2="600" y2="90%" style="stroke:#666;stroke-width:2" />

                        
                        <!-- 		X Scale -->
                        <text class="axis-text"x="{{leftMargin}}" y="95%" fill="#666">2025</text>
                        <text class="axis-text"x="{{chartWidth / 2}}" y="95%" fill="#666">2032</text>
                        <text class="axis-text"x="90%" y="95%" fill="#666">2040</text>
                        
                        <!-- 		Lines -->
                        <g transform="translate(-250,0) scale (2 1)">
                            <!-- Suffolk -->
                            <polyline points="150,110 200,90 250,80 300,90 350,82 400,65, 450,80"
                            style="fill:none;stroke:purple;stroke-width:3" />
                            
                            <!-- East of England -->
                            <polyline points="150,169 200,173 250,152 300,158 350,143 400,154, 450,158"
                            style="fill:none;stroke:gold;stroke-width:3" />
                            
                            <!-- England -->
                            <polyline points="150,194 200,193 250,179 300,191 350,193 400,189, 450,195"
                            style="fill:none;stroke:orange;stroke-width:3" />
                            
                        </g>
                    </svg>                            
                    <p class="govuk-body"><a href="#" class="govuk-link">Download chart image (PNG)</a><br>
                        <a href="#" class="govuk-link">Download table data (CSV)</a>
                    </p>
                    <p class="govuk-body">Source: Capacity Tracker<br>
                        Data correct as of 24 December 2024<br>
