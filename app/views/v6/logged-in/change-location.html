<div class="govuk-grid-row">

  <div class="govuk-grid-column-two-thirds">

    <form action="/v6/logged-in/index" method="post" novalidate>

      <div class="govuk-form-group">
        <h1 class="govuk-label-wrapper">
          <label class="govuk-label govuk-label--xl govuk-!-margin-bottom-9" for="careHome">{{pageName}}</label>
        </h1>

        <div id="la-hint" class="govuk-hint">
          Start typing for suggestions.
        </div>

        <select class="govuk-select" id="careHome" name="careHome" aria-describedby="careHome-hint" data-module="autocomplete" data-autoselect="" data-display-menu="" data-min-length="" data-show-all-values="" data-show-no-options-found="">
          <option value="" selected="" disabled="">Select an option</option>  
          <option value="Apple Farm Care Home"{% if data.careHome == 'Apple Farm Care Home' %} selected{% endif %}>Apple Farm Care Home</option>
          <option value="Greenfields Care Home"{% if data.careHome == 'Greenfields Care Home' %} selected{% endif %}>Greenfields Care Home</option>
          <option value="Lily Hill Care Home"{% if data.careHome == 'Lily Hill Care Home' %} selected{% endif %}>Lily Hill Care Home</option>
          <option value="Shoggins Care Home"{% if data.careHome == 'Shoggins Care Home' %} selected{% endif %}>Shoggins Care Home</option>
          <option value="Strawberry Hill Care Home"{% if data.careHome == 'Strawberry Hill Care Home' %} selected{% endif %}>Strawberry Hill Care Home</option>
          <option value="Waterfall Care Home"{% if data.careHome == 'Waterfall Care Home' %} selected{% endif %}>Waterfall Care Home</option>
        </select>
      </div>

        <button type="submit" class="govuk-button" data-module="govuk-button">Apply changes</button>
        <a href="javascript:window.history.back()" class="govuk-link">Cancel and go back</a>
      </div>
